name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy httpx

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy --ignore-missing-imports --no-error-summary position_state.py risk_manager.py trade_store.py notifier.py
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
        env:
          WEBHOOK_SECRET: "test-secret-for-ci"

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t trading-bot:${{ github.sha }} .

      - name: Verify Docker image
        run: docker run --rm trading-bot:${{ github.sha }} python -c "import fastapi; print('OK')"
