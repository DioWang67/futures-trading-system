# Shioaji credentials usually come from .env.
shioaji:
  api_key: "${SHIOAJI_API_KEY}"
  secret_key: "${SHIOAJI_SECRET_KEY}"
  person_id: "${SHIOAJI_PERSON_ID}"
  ca_path: "${SHIOAJI_CA_PATH}"
  ca_password: "${SHIOAJI_CA_PASS}"
  simulation: false
  futures_symbol: "TMF"
  point_value: 10
  enable_quote_monitor: true
  quote_stale_seconds: 15
  protective_watchdog_interval: 5
  protective_exit_price_type: "MKP"
  protective_limit_offset_points: 2

instrument:
  symbol: "TMF"
  exchange: "TAIFEX"

backtest:
  commission: 22
  slippage: 1
  size: 1
  point_value: 10

strategy:
  swing_lookback: 5
  bos_min_move: 15
  ob_max_age: 20
  ob_body_ratio: 0.4
  fvg_min_gap: 5
  fvg_enabled: true
  pa_confirm: true
  pin_bar_ratio: 0.6
  engulf_ratio: 1.0
  rr_ratio: 2.0
  use_structure_tp: true
  adx_period: 14
  adx_threshold: 20.0
  adx_filter_enabled: true

optimization:
  n_trials: 300
  timeout: 3600
  min_win_rate: 0.50
  min_profit_factor: 1.3
  min_sharpe: 0.5
  max_mdd: 0.15
  min_rr: 1.0

walk_forward:
  n_splits: 6
  train_ratio: 0.7
  min_pass_rate: 0.6
  min_win_rate: 0.45
  min_profit_factor: 1.1
  min_sharpe: 0.0
  max_mdd: 0.15
  min_rr: 0.0
